<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1,user-scalable=no">
    <title>伍季O.ooooo - 在线点餐</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"PingFang SC",Microsoft Yahei,sans-serif;}
        body{background:#f8f9fa;padding-bottom:220px;}
        /* 点餐页面样式 */
        .header{background:linear-gradient(135deg,#2c2c2c,#404040);padding:22px 15px;border-radius:0 0 22px 22px;color:#fff;text-align:center;}
        .header h2{font-size:25px;font-weight:600;letter-spacing:2px;}
        .header p{font-size:13px;margin-top:6px;opacity:0.9;}
        .cate-nav{display:flex;background:#fff;margin:12px;border-radius:18px;overflow:hidden;box-shadow:0 2px 10px #eee;}
        .cate-nav span{flex:1;text-align:center;padding:14px 0;font-size:14px;color:#666;transition:all 0.3s ease;}
        .cate-nav span.active{background:#2c2c2c;color:#fff;font-weight:500;}
        .food-card{background:#fff;margin:10px 12px;padding:15px;border-radius:18px;display:flex;align-items:center;box-shadow:0 4px 12px #eaeaea;}
        .food-img{width:82px;height:82px;border-radius:14px;object-fit:cover; margin-right:15px;}
        .food-info{flex:1;}
        .food-name{font-size:16px;color:#222;font-weight:500;}
        .food-desc{font-size:12px;color:#999;margin:5px 0;}
        .food-price{font-size:17px;color:#c8161d;font-weight:bold;}
        .num-group{display:flex;align-items:center;gap:12px;}
        .sub-btn,.add-btn{width:34px;height:34px;border-radius:50%;border:none;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
        .sub-btn{background:#f1f1f1;color:#888;}
        .add-btn{background:#2c2c2c;color:#fff;box-shadow:0 2px 6px #ddd;}
        .num-text{font-size:15px;width:32px;text-align:center;color:#333;}
        .info-box{margin:12px;background:#fff;padding:16px;border-radius:18px;box-shadow:0 4px 12px #eaeaea;}
        .info-title{font-size:15px;color:#333;margin-bottom:12px;font-weight:500;}
        .info-box input{width:100%;height:46px;padding:0 14px;border:1px solid #eee;border-radius:12px;margin-bottom:12px;font-size:14px;outline:none;background:#fafafa;}
        .fixed-bottom{position:fixed;left:0;bottom:0;width:100%;background:#fff;padding:16px 20px;box-shadow:0 -4px 15px #eee;border-radius:22px 22px 0 0;z-index:10;}
        .total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
        .total-text{font-size:15px;color:#555;}
        .total-money{font-size:21px;color:#c8161d;font-weight:bold;}
        .order-btn{width:100%;height:50px;background:#2c2c2c;border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:500;cursor:pointer;}
        .order-tips{text-align:center;font-size:12px;color:#aaa;margin-top:8px;}
        .open-admin{margin:12px;width:calc(100% - 24px);height:44px;background:#0066cc;border:none;border-radius:12px;color:#fff;font-size:14px;cursor:pointer;}
        /* 管理弹窗 */
        .admin-mask{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:99;display:none;padding:15px;overflow-y:auto;}
        .admin-box{background:#fff;border-radius:16px;padding:18px;max-width:700px;margin:0 auto;}
        .admin-close{width:100%;height:44px;background:#999;border:none;border-radius:10px;color:#fff;margin-bottom:16px;cursor:pointer;}
        .form-item{margin-bottom:12px;}
        label{display:block;margin-bottom:6px;font-weight:500;color:#333;}
        .admin-box input,.admin-box select{width:100%;height:44px;padding:0 12px;border:1px solid #ddd;border-radius:10px;font-size:14px;}
        textarea{width:100%;min-height:120px;padding:10px;border:1px solid #ddd;border-radius:10px;font-size:14px;}
        .admin-btn{width:100%;height:46px;background:#2c2c2c;color:#fff;border:none;border-radius:10px;font-size:16px;margin-top:8px;cursor:pointer;}
        .copy-btn{background:#009944;}
        .del-btn{background:#d81e06;width:70px;height:36px;font-size:13px;border:none;border-radius:6px;color:#fff;cursor:pointer;}
        .food-item{display:flex;align-items:center;justify-content:space-between;padding:12px;border-bottom:1px solid #eee;gap:10px;}
        .food-img-sm{width:60px;height:60px;border-radius:8px;object-fit:cover;}
        .tip{font-size:12px;color:#888;margin-top:8px;text-align:center;line-height:1.6;}
        .status{color:#009944;text-align:center;margin:10px 0;font-weight:500;}
    </style>
</head>
<body>
    <!-- 点餐主界面 -->
    <div class="header">
        <h2>伍季O.ooooo</h2>
        <p>匠心烹制 · 新鲜现做 · 一键轻松下单</p>
    </div>

    <div class="cate-nav">
        <span class="active" data-type="all">全部</span>
        <span data-type="hot">热菜</span>
        <span data-type="cold">凉菜</span>
        <span data-type="zhu">主食</span>
        <span data-type="yin">饮品</span>
    </div>

    <div id="foodList"></div>

    <button class="open-admin" onclick="showAdmin()">进入菜品管理（商家专用）</button>

    <div class="info-box">
        <div class="info-title">用餐信息填写</div>
        <input type="text" id="tableNum" placeholder="请输入桌号 / 用餐位置">
        <input type="text" id="userPhone" placeholder="联系电话（选填）">
        <input type="text" id="userRemark" placeholder="口味偏好、忌口、其他备注">
    </div>

    <div class="fixed-bottom">
        <div class="total-row">
            <div class="total-text">已选商品</div>
            <div class="total-money">合计：¥<span id="allTotal">0</span></div>
        </div>
        <button class="order-btn" onclick="submitOrder()">立即提交订单</button>
        <div class="order-tips">提交成功后商家即刻收到订单</div>
    </div>

    <!-- 菜品管理弹窗 -->
    <div class="admin-mask" id="adminMask">
        <div class="admin-box">
            <button class="admin-close" onclick="hideAdmin()">关闭管理面板</button>
            <h2 style="text-align:center;margin-bottom:16px;">菜品管理后台</h2>
            <div class="status" id="syncStatus">加载本地缓存菜品</div>

            <div class="form-item">
                <label>菜品图片链接（选填）</label>
                <input id="imgUrl" placeholder="不填则不显示菜品图">
            </div>
            <div class="form-item">
                <label>菜品名称（必填）</label>
                <input id="foodName" placeholder="例：红烧排骨">
            </div>
            <div class="form-item">
                <label>菜品简介（选填）</label>
                <input id="foodDesc" placeholder="不填则不展示简介">
            </div>
            <div class="form-item">
                <label>菜品价格（必填）</label>
                <input type="number" id="foodPrice" placeholder="数字，例：42">
            </div>
            <div class="form-item">
                <label>菜品分类</label>
                <select id="foodType">
                    <option value="hot">热菜</option>
                    <option value="cold">凉菜</option>
                    <option value="zhu">主食</option>
                    <option value="yin">饮品</option>
                </select>
            </div>
            <button class="admin-btn" onclick="addFood()">添加菜品</button>

            <h3 style="margin:20px 0 10px;">全部菜品列表</h3>
            <div id="foodListBox"></div>

            <button class="admin-btn copy-btn" onclick="copyJson()">导出JSON（复制去更新food.json）</button>
            <textarea id="jsonOutput" readonly placeholder="导出的菜品JSON会显示在这里"></textarea>
            <div class="tip">操作步骤：复制文本 → 打开仓库food.json编辑替换 → 保存，顾客刷新页面更新菜单</div>
        </div>
    </div>

<script>
// WxPusher配置不变
const appToken = "AT_xLUfNE66W3XjqSMr4ntBC8980uZ0IAzj";
const uId = "UID_wjCIqe4QOUqfsSsvXGFtnJnY42et";
let foodData = [];
let cart = {};
let nowType = "all";

// 页面初始化：优先读取本地缓存，无缓存则加载线上food.json
async function initLoad(){
    let local = localStorage.getItem("wujiMenu");
    if(local){
        foodData = JSON.parse(local);
        setStatus("读取本地缓存菜品成功");
    }else{
        try{
            const res = await fetch("./food.json");
            foodData = await res.json();
            localStorage.setItem("wujiMenu",JSON.stringify(foodData));
            setStatus("从云端加载初始菜品完成");
        }catch(e){
            setStatus("云端文件加载失败，请手动导出JSON同步", "#f00");
            // 兜底默认菜品
            foodData = [
                {"name":"红烧排骨","desc":"色泽红亮，软烂入味，酱香浓郁","price":42,"type":"hot","img":"https://pic.5tu.cn/photo/202503/58967_202503051425272921.jpg"},
                {"name":"糖醋虾仁","desc":"外酥里嫩，酸甜适口，老少皆宜","price":46,"type":"hot","img":"https://pic.5tu.cn/photo/202503/58967_202503051425272921.jpg"},
                {"name":"红烧鸡翅","desc":"肉质鲜嫩，入味十足，下饭神器","price":35,"type":"hot","img":"https://pic.5tu.cn/photo/202503/58967_202503051425272921.jpg"}
            ];
        }
    }
    renderFood();
    renderAdmin();
}

// 弹窗开关
function showAdmin(){
    document.getElementById("adminMask").style.display = "block";
}
function hideAdmin(){
    document.getElementById("adminMask").style.display = "none";
}

// 点餐页面渲染
function renderFood(){
    let html = "";
    let filterList = nowType === "all" ? foodData : foodData.filter(item=>item.type === nowType);
    filterList.forEach(item=>{
        let count = cart[item.name] || 0;
        let imgHtml = "";
        if(item.img){
            imgHtml = `<img class="food-img" src="${item.img}" alt="${item.name}">`;
        }
        let descHtml = "";
        if(item.desc){
            descHtml = `<div class="food-desc">${item.desc}</div>`;
        }
        html += `<div class="food-card">
            ${imgHtml}
            <div class="food-info">
                <div class="food-name">${item.name}</div>
                ${descHtml}
                <div class="food-price">¥${item.price}</div>
            </div>
            <div class="num-group">
                <button class="sub-btn" onclick="cutFoodNum('${item.name}')">-</button>
                <span class="num-text">${count}</span>
                <button class="add-btn" onclick="addFoodNum('${item.name}')">+</button>
            </div>
        </div>`;
    });
    document.getElementById("foodList").innerHTML = html;
    calcTotalPrice();
}

// 加减份数
function addFoodNum(name){
    cart[name] = (cart[name]||0)+1; renderFood();
}
function cutFoodNum(name){
    if(cart[name]>0) cart[name]--; renderFood();
}

// 计算总价
function calcTotalPrice(){
    let total=0;
    for(let name in cart){
        if(cart[name]>0){
            let f=foodData.find(v=>v.name===name);
            total += f.price * cart[name];
        }
    }
    document.getElementById("allTotal").innerText = total;
    return total;
}

// 分类切换
document.querySelectorAll(".cate-nav span").forEach(tab=>{
    tab.onclick = function(){
        document.querySelectorAll(".cate-nav span").forEach(i=>i.classList.remove("active"));
        this.classList.add("active");
        nowType = this.dataset.type; renderFood();
    }
});

// 订单提交（GET跨域兼容，不会下单失败）
function submitOrder(){
    let total = calcTotalPrice();
    if(total <= 0){alert("请先挑选心仪菜品再下单~");return;}
    let table = document.getElementById("tableNum").value || "无";
    let phone = document.getElementById("userPhone").value || "无";
    let remark = document.getElementById("userRemark").value || "无";
    let detail = "";
    for(let name in cart){
        if(cart[name]>0){
            let f=foodData.find(v=>v.name===name);
            detail += `${name}×${cart[name]} `;
        }
    }
    let msg = `【伍季新订单】\n桌号：${table}\n电话：${phone}\n备注：${remark}\n菜品：${detail}\n总价：${total}元`;
    fetch(`https://wxpusher.zjiecode.com/api/send/message?appToken=${appToken}&content=${encodeURIComponent(msg)}&uid=${uId}`,{
        method:"GET",
        mode:"no-cors"
    }).finally(()=>{
        alert("订单提交成功！商家已收到");
        cart = {};
        renderFood();
        document.getElementById("tableNum").value = "";
        document.getElementById("userPhone").value = "";
        document.getElementById("userRemark").value = "";
    })
}

// ========== 管理面板逻辑 ==========
function addFood(){
    const img = document.getElementById("imgUrl").value.trim();
    const name = document.getElementById("foodName").value.trim();
    const desc = document.getElementById("foodDesc").value.trim();
    const price = Number(document.getElementById("foodPrice").value);
    const type = document.getElementById("foodType").value;

    // 仅校验菜名、价格必填，图片、简介不校验
    if(!name){
        alert("请填写菜品名称");
        return;
    }
    if(!price || price <= 0){
        alert("请填写有效的菜品价格");
        return;
    }

    foodData.push({
        img: img,
        name: name,
        desc: desc,
        price: price,
        type: type
    });
    localStorage.setItem("wujiMenu",JSON.stringify(foodData));
    // 清空输入框
    document.getElementById("imgUrl").value = "";
    document.getElementById("foodName").value = "";
    document.getElementById("foodDesc").value = "";
    document.getElementById("foodPrice").value = "";
    renderAdmin();
    renderFood();
    setStatus("菜品添加成功，记得导出JSON同步云端");
}

// 删除菜品
function delFood(index){
    if(!confirm("确定删除该菜品？")) return;
    foodData.splice(index,1);
    localStorage.setItem("wujiMenu",JSON.stringify(foodData));
    renderAdmin();
    renderFood();
    setStatus("已删除，导出JSON同步云端生效");
}

// 渲染管理列表
function renderAdmin(){
    let html = "";
    foodData.forEach((item,idx)=>{
        let imgHtml = "";
        if(item.img){
            imgHtml = `<img class="food-img-sm" src="${item.img}">`;
        }
        let descText = item.desc || "无简介";
        html += `<div class="food-item">
            ${imgHtml}
            <div style="flex:1">
                <div>${item.name} ¥${item.price}</div>
                <div style="font-size:12px;color:#777">${descText}</div>
            </div>
            <button class="del-btn" onclick="delFood(${idx})">删除</button>
        </div>`;
    })
    document.getElementById("foodListBox").innerHTML = html || "<p style='text-align:center;color:#999'>暂无菜品</p>";
}

// 导出可同步的JSON文本
function copyJson(){
    const jsonStr = JSON.stringify(foodData,null,4);
    document.getElementById("jsonOutput").value = jsonStr;
    document.getElementById("jsonOutput").select();
    document.execCommand("copy");
    alert("JSON已复制！前往仓库编辑food.json替换保存即可全设备同步");
}

// 状态文字
function setStatus(text, color="#009944"){
    const el = document.getElementById("syncStatus");
    el.innerText = text;
    el.style.color = color;
}

// 页面加载执行
initLoad();
</script>
</body>
</html>
