<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1,user-scalable=no">
    <title>伍季菜品管理后台-自动同步云端</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"PingFang SC",Microsoft Yahei;}
        body{background:#f5f5f5;padding:15px;max-width:700px;margin:0 auto;}
        .box{background:#fff;border-radius:16px;padding:18px;margin-bottom:20px;box-shadow:0 2px 10px #eee;}
        h2{text-align:center;color:#222;margin-bottom:16px;}
        .form-item{margin-bottom:12px;}
        label{display:block;margin-bottom:6px;font-weight:500;color:#333;}
        input,select{width:100%;height:44px;padding:0 12px;border:1px solid #ddd;border-radius:10px;font-size:14px;}
        textarea{width:100%;min-height:80px;padding:10px;border:1px solid #ddd;border-radius:10px;font-size:14px;}
        button{width:100%;height:46px;background:#2c2c2c;color:#fff;border:none;border-radius:10px;font-size:16px;margin-top:8px;cursor:pointer;}
        .btn-sync{background:#009944;}
        .btn-del{background:#d81e06;width:70px;height:36px;font-size:13px;}
        .food-item{display:flex;align-items:center;justify-content:space-between;padding:12px;border-bottom:1px solid #eee;gap:10px;}
        .food-img{width:60px;height:60px;border-radius:8px;object-fit:cover;}
        .tip{font-size:12px;color:#888;margin-top:8px;text-align:center;line-height:1.6;}
        .status{color:#009944;text-align:center;margin:10px 0;font-weight:500;}
    </style>
</head>
<body>
    <div class="box">
        <h2>GitHub 连接信息</h2>
        <div class="status" id="syncStatus">Token已内置，无需手动填写</div>
    </div>

    <div class="box">
        <h2>新增菜品</h2>
        <div class="form-item">
            <label>菜品图片链接</label>
            <input id="imgUrl" placeholder="粘贴国内图片网络地址">
        </div>
        <div class="form-item">
            <label>菜品名称</label>
            <input id="foodName" placeholder="例：红烧排骨">
        </div>
        <div class="form-item">
            <label>菜品简介</label>
            <input id="foodDesc" placeholder="简短描述菜品">
        </div>
        <div class="form-item">
            <label>菜品价格</label>
            <input type="number" id="foodPrice" placeholder="数字，例：42">
        </div>
        <div class="form-item">
            <label>菜品分类</label>
            <select id="foodType">
                <option value="hot">热菜</option>
                <option value="cold">凉菜</option>
                <option value="zhu">主食</option>
                <option value="yin">饮品</option>
            </select>
        </div>
        <button onclick="addFood()">添加菜品</button>
    </div>

    <div class="box">
        <h2>全部菜品列表</h2>
        <div id="foodListBox"></div>
        <button class="btn-sync" onclick="autoSyncGit()">一键同步到GitHub（自动更新food.json）</button>
        <div class="tip">点击同步后，顾客刷新点餐页即可看到最新菜单</div>
    </div>

<script>
// GitHub 固定配置
const GIT_OWNER = "ToWuJi";
const GIT_REPO = "ToWuJi.github.io";
const GIT_FILE_PATH = "food.json";
const GIT_BRANCH = "main";
// 内置你的完整Token
const GIT_TOKEN = "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";

let foodList = [];
let fileSha = "";

window.onload = async function(){
    await loadRemoteFood();
}

// 拉取云端菜品数据
async function loadRemoteFood(){
    setStatus("正在加载云端菜品...");
    try{
        const res = await fetch(`https://api.github.com/repos/${GIT_OWNER}/${GIT_REPO}/contents/${GIT_FILE_PATH}?ref=${GIT_BRANCH}`,{
            headers: {Authorization: `token ${GIT_TOKEN}`}
        })
        const data = await res.json();
        if(data.content){
            fileSha = data.sha;
            const rawJson = atob(data.content);
            foodList = JSON.parse(rawJson);
            renderAdmin();
            setStatus("菜品加载完成，可以编辑");
        }else{
            setStatus("文件读取失败，请检查仓库", "#f00");
        }
    }catch(err){
        setStatus("加载失败："+err.message, "#f00");
    }
}

// 一键同步上传
async function autoSyncGit(){
    if(!fileSha){
        await loadRemoteFood();
        if(!fileSha) return;
    }
    setStatus("正在同步至GitHub云端...");
    const jsonStr = JSON.stringify(foodList, null, 4);
    const base64Content = btoa(unescape(encodeURIComponent(jsonStr)));
    const body = {
        message: "自动更新菜品库",
        content: base64Content,
        sha: fileSha,
        branch: GIT_BRANCH
    }
    try{
        const res = await fetch(`https://api.github.com/repos/${GIT_OWNER}/${GIT_REPO}/contents/${GIT_FILE_PATH}`,{
            method: "PUT",
            headers: {
                Authorization: `token ${GIT_TOKEN}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify(body)
        })
        const result = await res.json();
        if(result.commit){
            fileSha = result.content.sha;
            setStatus("✅ 同步成功！顾客刷新点餐页即可更新菜单");
        }else{
            setStatus("同步失败："+JSON.stringify(result), "#f00");
        }
    }catch(err){
        setStatus("同步异常："+err.message, "#f00");
    }
}

// 新增菜品
function addFood(){
    const img = document.getElementById("imgUrl").value.trim();
    const name = document.getElementById("foodName").value.trim();
    const desc = document.getElementById("foodDesc").value.trim();
    const price = Number(document.getElementById("foodPrice").value);
    const type = document.getElementById("foodType").value;
    if(!img||!name||!desc||!price){
        alert("图片链接、菜名、简介、价格不能为空");
        return;
    }
    foodList.push({img,name,desc,price,type});
    document.getElementById("imgUrl").value = "";
    document.getElementById("foodName").value = "";
    document.getElementById("foodDesc").value = "";
    document.getElementById("foodPrice").value = "";
    renderAdmin();
    setStatus("菜品添加成功，点击一键同步上传云端");
}

// 删除菜品
function delFood(index){
    if(!confirm("确定删除该菜品？")) return;
    foodList.splice(index,1);
    renderAdmin();
    setStatus("已删除，点击一键同步更新云端");
}

// 渲染列表
function renderAdmin(){
    let html = "";
    foodList.forEach((item,idx)=>{
        html += `<div class="food-item">
            <img class="food-img" src="${item.img}">
            <div style="flex:1">
                <div>${item.name} ¥${item.price}</div>
                <div style="font-size:12px;color:#777">${item.desc}</div>
            </div>
            <button class="btn-del" onclick="delFood(${idx})">删除</button>
        </div>`;
    })
    document.getElementById("foodListBox").innerHTML = html || "<p style='text-align:center;color:#999'>暂无菜品</p>";
}

// 状态提示
function setStatus(text, color="#009944"){
    const el = document.getElementById("syncStatus");
    el.innerText = text;
    el.style.color = color;
}
</script>
</body>
</html>
